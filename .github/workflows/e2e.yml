name: E2E

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/e2e.yml"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "uv.lock"
      - "pole_position/**"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  non-docker:
    name: Non-Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install e2e dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest uv

      - name: Verify uv
        run: uv --version

      - name: Run non-Docker e2e tests
        env:
          POLEPOSITION_RUN_E2E: "1"
        run: python -m pytest pole_position/tests/test_e2e_workflows.py -m "e2e and not docker_e2e"
