[project]
name = "poleposition"
version = "0.0.3"
description = "FastAPI project scaffolder for building clean and scalable APIs"
readme = "README.md"
requires-python = ">=3.10"

keywords = [
    "fastapi",
    "scaffold",
    "scaffolding",
    "cli",
    "starter",
    "template",
    "api",
    "backend",
]

classifiers = [
    "Programming Language :: Python :: 3",
    "Framework :: FastAPI",
    "License :: OSI Approved :: MIT License",
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Code Generators",
]

[project.urls]
Homepage = "https://github.com/erenertem/poleposition"
Repository = "https://github.com/erenertem/poleposition"
Issues = "https://github.com/erenertem/poleposition/issues"