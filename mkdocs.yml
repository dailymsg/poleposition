site_name: PolePosition
site_url: https://erenertemden.github.io/poleposition/
site_description: Project lifecycle CLI for starting and growing enterprise FastAPI projects
repo_url: https://github.com/erenertemden/poleposition
repo_name: erenertemden/poleposition
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  favicon: assets/logo/poleposition-fav.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

extra_css:
  - assets/styles/font-size.css

extra_javascript:
  - assets/scripts/font-size.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - Configuration Reference: configuration.md
  - Database and Migrations: database.md
  - Spring and .NET Module Guide: spring-dotnet-module-structure.md
  - Architecture: architecture.md
  - Architecture Diagram: architecture-diagram.md
  - Agent Recommendation Guide: agent-recommendation.md
  - Project Checks: project-checks.md
  - Feature Status: feature-status.md
  - Integrations:
      - Overview: integrations/index.md
      - Kafka: integrations/kafka.md
      - RabbitMQ: integrations/rabbitmq.md
      - LLM: integrations/llm.md
  - Examples:
      - Overview: examples/index.md
      - User Registration: examples/user-registration.md
      - Auth Foundation: examples/auth-foundation.md
      - HTML Swap: examples/html-swap.md
  - Troubleshooting and FAQ: troubleshooting.md
  - Release and Upgrade Notes: release-upgrade-notes.md
